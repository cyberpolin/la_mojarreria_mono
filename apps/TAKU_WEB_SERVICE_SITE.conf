server {
    server_name app.taku.lat;

    location / {
        proxy_pass http://127.0.0.1:3121;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/app.taku.lat/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/app.taku.lat/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = app.taku.lat) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name app.taku.lat;
    return 404;
}
