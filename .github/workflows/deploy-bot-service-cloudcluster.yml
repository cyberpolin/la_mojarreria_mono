name: Deploy Bot Service to CloudCluster

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: bot-service-cloudcluster
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudcluster

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Validate deploy secrets
        env:
          BOT_SERVICE_ENV_FILE: ${{ secrets.BOT_SERVICE_ENV_FILE }}
          CLOUDCLUSTER_HOST: ${{ secrets.CLOUDCLUSTER_HOST }}
          CLOUDCLUSTER_USER: ${{ secrets.CLOUDCLUSTER_USER }}
          CLOUDCLUSTER_SSH_KEY: ${{ secrets.CLOUDCLUSTER_SSH_KEY }}
          CLOUDCLUSTER_SSH_PORT: ${{ secrets.CLOUDCLUSTER_SSH_PORT }}
        run: |
          set -eu

          missing=0
          for name in BOT_SERVICE_ENV_FILE CLOUDCLUSTER_HOST CLOUDCLUSTER_USER CLOUDCLUSTER_SSH_KEY; do
            value="$(printenv "$name" || true)"
            if [ -z "$value" ]; then
              echo "::error::$name is missing"
              missing=1
            else
              echo "$name is configured (length: ${#value})"
            fi
          done

          if [ -n "${CLOUDCLUSTER_SSH_PORT:-}" ]; then
            echo "CLOUDCLUSTER_SSH_PORT is configured"
          else
            echo "CLOUDCLUSTER_SSH_PORT is not configured; defaulting to 22"
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @mojarreria/bot-service typecheck

      - name: Build
        run: |
          pnpm --filter @mojarreria/bot-service build
          find apps/bot-service/dist -maxdepth 2 -type f -print

      - name: Write service env file
        env:
          BOT_SERVICE_ENV_FILE: ${{ secrets.BOT_SERVICE_ENV_FILE }}
        run: |
          set -eu
          if [ -n "${BOT_SERVICE_ENV_FILE:-}" ]; then
            printf '%s\n' "$BOT_SERVICE_ENV_FILE" > apps/bot-service/.env
            chmod 600 apps/bot-service/.env
          else
            echo "::error::BOT_SERVICE_ENV_FILE is missing"
            exit 1
          fi

          echo "Generated apps/bot-service/.env"
          wc -c apps/bot-service/.env
          for name in BOT_SERVICE_API_KEY DEEPSEEK_API_KEY DEEPSEEK_BASE_URL DEEPSEEK_MODEL; do
            if grep -q "^$name=" apps/bot-service/.env; then
              value="$(grep "^$name=" apps/bot-service/.env | tail -1 | cut -d= -f2-)"
              echo "$name present (length: ${#value})"
            else
              echo "::error::$name is missing from BOT_SERVICE_ENV_FILE"
              exit 1
            fi
          done

          node -e "import('./apps/bot-service/dist/config.js').then(({config}) => console.log(JSON.stringify({host: config.host, port: config.port, deepseekBaseUrl: config.deepseekBaseUrl, deepseekModel: config.deepseekModel, apiKeyLength: config.apiKey.length, deepseekApiKeyLength: config.deepseekApiKey.length})))"

      - name: Prepare release bundle
        run: |
          set -eux
          mkdir -p /tmp/mojarreria-bot-service
          rsync -a \
            --exclude ".env.example" \
            --exclude "data" \
            --exclude "dist" \
            --exclude "node_modules" \
            apps/bot-service/ /tmp/mojarreria-bot-service/
          tar -czf mojarreria-bot-service.tar.gz -C /tmp mojarreria-bot-service
          ls -lh mojarreria-bot-service.tar.gz

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CLOUDCLUSTER_HOST }}
          username: ${{ secrets.CLOUDCLUSTER_USER }}
          key: ${{ secrets.CLOUDCLUSTER_SSH_KEY }}
          port: ${{ secrets.CLOUDCLUSTER_SSH_PORT || 22 }}
          source: mojarreria-bot-service.tar.gz
          target: /tmp
          debug: true

      - name: SSH smoke test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUDCLUSTER_HOST }}
          username: ${{ secrets.CLOUDCLUSTER_USER }}
          key: ${{ secrets.CLOUDCLUSTER_SSH_KEY }}
          port: ${{ secrets.CLOUDCLUSTER_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          request_pty: true
          debug: true
          script: |
            set -eu
            echo "SSH smoke test started"
            whoami
            hostname
            pwd
            echo "SSH smoke test finished"

      - name: Deploy on CloudCluster
        id: deploy_ssh
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: /var/www/bot-service
        with:
          host: ${{ secrets.CLOUDCLUSTER_HOST }}
          username: ${{ secrets.CLOUDCLUSTER_USER }}
          key: ${{ secrets.CLOUDCLUSTER_SSH_KEY }}
          port: ${{ secrets.CLOUDCLUSTER_SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          timeout: 60s
          command_timeout: 15m
          request_pty: true
          debug: true
          script: |
            set -eu
            LOG_FILE="/tmp/mojarreria-bot-service-deploy.log"
            : > "$LOG_FILE"

            run_deploy() {
            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"

            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ ! -s "$NVM_DIR/nvm.sh" ] || . "$NVM_DIR/nvm.sh"

            echo "Remote user: $(whoami)"
            echo "Remote host: $(hostname)"
            echo "Deploy path: configured"
            echo "Initial directory: $(pwd)"
            df -h .
            free -h || true
            ls -lh /tmp/mojarreria-bot-service.tar.gz

            mkdir -p "$DEPLOY_PATH"
            tar -xzf /tmp/mojarreria-bot-service.tar.gz -C "$DEPLOY_PATH" --strip-components=1
            cd "$DEPLOY_PATH"
            echo "Extracted directory: $(pwd)"
            ls -la
            cat package.json
            cat tsconfig.json
            if [ -f .env ]; then
              echo "Remote .env exists"
              wc -c .env
              for name in BOT_SERVICE_API_KEY DEEPSEEK_API_KEY DEEPSEEK_BASE_URL DEEPSEEK_MODEL; do
                if grep -q "^$name=" .env; then
                  value="$(grep "^$name=" .env | tail -1 | cut -d= -f2-)"
                  echo "Remote $name present (length: ${#value})"
                else
                  echo "Remote $name missing"
                  exit 1
                fi
              done
            else
              echo "Remote .env missing"
              exit 1
            fi

            if command -v nvm >/dev/null 2>&1; then
              nvm install 20.19.4
              nvm use 20.19.4
            fi

            node --version
            corepack enable
            corepack prepare pnpm@9.15.5 --activate
            pnpm --version
            pnpm config get store-dir

            pnpm install --prod=false --no-frozen-lockfile
            pnpm exec tsc --version
            pnpm list --depth 0 || true
            du -sh node_modules 2>/dev/null || true
            pnpm build
            find dist -maxdepth 2 -type f -print
            mkdir -p data
            pnpm exec pm2 startOrReload ecosystem.config.cjs --env production
            pnpm exec pm2 save
            pnpm exec pm2 status
            }

            set +e
            run_deploy > "$LOG_FILE" 2>&1
            DEPLOY_STATUS="$?"
            set -e

            echo "Remote deploy log:"
            cat "$LOG_FILE"
            exit "$DEPLOY_STATUS"

      - name: Fetch remote deploy log
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUDCLUSTER_HOST }}
          username: ${{ secrets.CLOUDCLUSTER_USER }}
          key: ${{ secrets.CLOUDCLUSTER_SSH_KEY }}
          port: ${{ secrets.CLOUDCLUSTER_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          request_pty: true
          debug: true
          script: |
            set -eu
            echo "Remote deploy log:"
            if [ -f /tmp/mojarreria-bot-service-deploy.log ]; then
              cat /tmp/mojarreria-bot-service-deploy.log
            else
              echo "No remote deploy log file found"
            fi
