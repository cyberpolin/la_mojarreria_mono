name: WA Service CI

on:
  pull_request:
    paths:
      - "apps/wa-service/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/wa-service-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/wa-service/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/wa-service-ci.yml"

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Detect service directory
        run: |
          set -eux
          if [ -f apps/wa-service/package.json ]; then
            echo "SERVICE_DIR=apps/wa-service" >> "$GITHUB_ENV"
          else
            echo "SERVICE_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Print build diagnostics
        run: |
          set -eux
          echo "GitHub workspace: $GITHUB_WORKSPACE"
          echo "Service directory: $SERVICE_DIR"
          pwd
          node --version
          pnpm --version
          pnpm config get store-dir
          ls -la
          ls -la "$SERVICE_DIR"
          test -f pnpm-workspace.yaml && cat pnpm-workspace.yaml || true
          cat "$SERVICE_DIR/package.json"
          cat "$SERVICE_DIR/tsconfig.json"

      - name: Install dependencies
        run: |
          set -eux
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Print dependency diagnostics
        run: |
          set -eux
          pnpm --dir "$SERVICE_DIR" exec tsc --version
          pnpm --dir "$SERVICE_DIR" list --depth 0 || true
          du -sh node_modules "$SERVICE_DIR/node_modules" 2>/dev/null || true

      - name: Typecheck
        run: |
          set -eux
          pnpm --dir "$SERVICE_DIR" typecheck

      - name: Build
        run: |
          set -eux
          pnpm --dir "$SERVICE_DIR" build
          find "$SERVICE_DIR/dist" -maxdepth 2 -type f -print
