name: Bot Service CI

on:
  pull_request:
    paths:
      - "apps/bot-service/**"
      - ".github/workflows/bot-service-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/bot-service/**"
      - ".github/workflows/bot-service-ci.yml"

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @mojarreria/bot-service typecheck

      - name: Build
        run: |
          pnpm --filter @mojarreria/bot-service build
          find apps/bot-service/dist -maxdepth 2 -type f -print
